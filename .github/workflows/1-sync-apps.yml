name: 1. Sync App Packages (应用层搬运)

on:
  push:
    paths:
      - 'routing.yaml'
      - 'scripts/route_debs.py'
  workflow_dispatch:

jobs:
  sync_to_incoming:
    runs-on: self-hosted
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v3

      - name: 安装 PyYAML
        run: pip install pyyaml

      - name: 拉取所有 deb 并按 routing.yaml 分拣
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/route_debs.py routing.yaml incoming/

      - name: 配置 SSH 密钥
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: 使用 rsync 安全传送到公网服务器 Incoming 缓冲区
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          rsync -av -e "ssh -p ${{ secrets.SERVER_PORT }}" incoming/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/srv/apt-incoming/
