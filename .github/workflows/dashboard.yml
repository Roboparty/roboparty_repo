name: Dashboard (编译状态看板)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  dashboard:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Show dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/dashboard.py routing.yaml
