name: 2. Process APT Incoming (统一入库)

on:
  workflow_dispatch: # 核心：允许你手动点击运行！(为你手动传内核包准备的)
  workflow_run:      # 魔法：流水线A只要跑完，自动接力运行流水线B！
    workflows: ["1. Sync App Packages (应用层搬运)"]
    types:
      - completed

jobs:
  inject_to_repo:
    runs-on: ubuntu-latest
    # 确保流水线A是成功跑完的，或者你手动触发的，才执行入库
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v3

      - name: 配置 SSH 密钥
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: 将入库脚本及路由配置同步到服务器
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          rsync -avz -e "ssh -p ${{ secrets.SERVER_PORT }}" bot_inject.sh ubuntu@${{ secrets.SERVER_HOST }}:/tmp/bot_inject.sh
          [ -f routing.yaml ] && rsync -avz -e "ssh -p ${{ secrets.SERVER_PORT }}" routing.yaml ubuntu@${{ secrets.SERVER_HOST }}:/srv/apt/routing.yaml || true

      - name: 远程唤醒云服务器 Bot 进行静默入库
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo mkdir -p /srv/apt
            sudo mv /tmp/bot_inject.sh /srv/apt/bot_inject.sh
            sudo chmod +x /srv/apt/bot_inject.sh
            sudo chown -R ubuntu:ubuntu /srv/apt-incoming
            sudo chown -R ubuntu:ubuntu /srv/apt || true
            sudo rm -rf /tmp/gpg-wrap
            /srv/apt/bot_inject.sh
