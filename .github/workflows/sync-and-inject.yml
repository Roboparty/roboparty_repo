name: Sync & Inject (搬运 + 入库)

on:
  push:
    paths:
      - 'routing.yaml'
      - 'scripts/route_debs.py'
      - 'scripts/bot_inject.sh'
  workflow_dispatch:

jobs:
  sync:
    runs-on: [self-hosted, apt]
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Prepare dirs
        run: |
          sudo mkdir -p /srv/apt-incoming /srv/apt
          sudo chown -R $(whoami):$(whoami) /srv/apt-incoming /srv/apt

      - name: Download & route
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/route_debs.py routing.yaml /srv/apt-incoming/

      - name: Inject into APT repo
        run: bash scripts/bot_inject.sh
